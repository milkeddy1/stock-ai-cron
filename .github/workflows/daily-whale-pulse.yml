# Repository secrets (Settings → Secrets and variables → Actions):
#   Required: GEMINI_API_KEY, DISCORD_WEBHOOK_URL
#   Optional: WATCHLIST (comma-separated tickers; omit secret or leave unset to use app defaults)
#
# Schedule uses UTC only; runs may start a few minutes late. Adjust the cron hour for your local time.

name: Daily Whale Pulse

on:
  schedule:
    - cron: "30 13 * * *" # 21:30 Taiwan (UTC+8) = 13:30 UTC

  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Run job
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          WATCHLIST: ${{ secrets.WATCHLIST }}
        run: pnpm start
